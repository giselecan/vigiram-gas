<script>
// =========================================================
// js_admin.html — v3.0
//
// Painel Administrativo (perfil ADMIN) — dashboard style.
// Acessado via ícone de engrenagem na navbar.
//
// Arquitetura de navegação:
//   Sidebar (4 abas) → Visão Geral | Gatilhos | Logs e Auditoria | Configurações
//   "Configurações" abre uma sub-navegação em abas (pills) com as seções
//   Usuários / E-mails de Alerta / SLA / Setores / Listas-Dropdowns.
//
// Depende de: tokenSessao, mostrarToast, escapeHtml, _gerarIniciais (js_core)
// Backend: Admin.gs, Config.gs, Config_Write.gs
// =========================================================

let _gatCache = [];

// ─────────────────────────────────────────────────────────
// ABERTURA / FECHAMENTO DO MODAL PRINCIPAL
// ─────────────────────────────────────────────────────────
function abrirConfiguracoes() {
  let modal = document.getElementById('modalConfig');
  if (!modal) { _criarModalConfig(); modal = document.getElementById('modalConfig'); }
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  _cfgAtualizarIdentidade();
  _abrirSecaoTopo('visao_geral');
}

function fecharConfiguracoes() {
  const modal = document.getElementById('modalConfig');
  if (modal) { modal.classList.add('hidden'); modal.classList.remove('flex'); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('modalConfig');
    if (modal && modal.classList.contains('flex')) fecharConfiguracoes();
  }
});

// ─────────────────────────────────────────────────────────
// CRIAÇÃO DO MODAL (injetado uma vez no DOM)
// ─────────────────────────────────────────────────────────
function _criarModalConfig() {
  const modal = document.createElement('div');
  modal.id = 'modalConfig';
  modal.className = 'fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-0 sm:p-4';
  modal.innerHTML = `
    <div class="bg-white sm:rounded-2xl shadow-2xl w-full max-w-6xl h-full sm:h-[92vh] flex flex-col md:flex-row overflow-hidden relative">

      <!-- SIDEBAR DE NAVEGAÇÃO -->
      <div class="bg-gray-900 flex-shrink-0 flex flex-row md:flex-col overflow-x-auto md:overflow-x-visible md:overflow-y-auto border-b md:border-b-0 md:border-r border-gray-800 md:w-56">
        <div class="hidden md:flex items-center gap-2.5 p-5 border-b border-gray-700 flex-shrink-0">
          <i class="fas fa-shield-halved text-teal-400"></i>
          <div>
            <p class="text-white font-bold text-sm leading-none">Painel Admin</p>
            <p class="text-gray-400 text-xs mt-1">VigiRAM · Farmacovigilância</p>
          </div>
        </div>
        <nav class="flex md:flex-col flex-1 p-2 md:p-3 gap-1 md:gap-1 md:space-y-1">
          ${_menuItemTopo('visao_geral',   'fa-gauge-high',     'Visão Geral')}
          ${_menuItemTopo('gatilhos',      'fa-pills',          'Gatilhos')}
          ${_menuItemTopo('logs',          'fa-clipboard-list', 'Logs e Auditoria')}
          ${_menuItemTopo('configuracoes', 'fa-gear',           'Configurações')}
        </nav>
      </div>

      <!-- ÁREA DE CONTEÚDO -->
      <div class="flex-1 flex flex-col overflow-hidden min-w-0">
        <!-- CABEÇALHO -->
        <div class="flex items-center justify-between gap-3 px-4 sm:px-6 py-4 border-b border-gray-200 bg-white flex-shrink-0">
          <div class="min-w-0">
            <h2 id="cfgTituloSecao" class="text-lg font-bold text-gray-800 truncate">Visão Geral</h2>
            <p class="text-xs text-gray-400 hidden sm:block">Painel Administrativo · VigiRAM</p>
          </div>
          <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0">
            <div class="hidden sm:flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-full pl-1 pr-3 py-1">
              <div id="cfgAvatarUsuario" class="w-6 h-6 rounded-full bg-teal-700 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">--</div>
              <div class="leading-tight">
                <p id="cfgNomeUsuario" class="text-xs font-bold text-gray-700">—</p>
                <p id="cfgPerfilUsuario" class="text-xs text-gray-400 uppercase tracking-wide">Admin</p>
              </div>
            </div>
            <button onclick="fecharConfiguracoes()"
                    class="w-9 h-9 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-700 flex items-center justify-center transition"
                    title="Fechar">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>

        <div id="cfgConteudo" class="flex-1 overflow-y-auto p-4 sm:p-6 bg-gray-50"></div>
      </div>
    </div>`;
  modal.addEventListener('mousedown', e => { if (e.target === modal) fecharConfiguracoes(); });

  // Delegação de evento (configurada UMA vez, já que o modal é criado uma
  // única vez por sessão — mesmo padrão de js_kanban.html). Evita montar
  // onclick="..._('${email}')" com dado vindo do servidor: escapeHtml() só
  // neutraliza contexto HTML, não contexto "string JS dentro de atributo"
  // (o navegador decodifica entidades ANTES do JS ser interpretado, então
  // um e-mail malicioso ainda escaparia da string). data-* + getAttribute()
  // não sofre desse problema.
  modal.addEventListener('click', ev => {
    const btn = ev.target.closest('button[data-acao]');
    if (!btn) return;
    const acao  = btn.getAttribute('data-acao');
    const email = btn.getAttribute('data-email');
    if (acao === 'editar') {
      _cfgEditarUsuario(email);
    } else if (acao === 'reset-senha') {
      _cfgResetSenha(email);
    } else if (acao === 'alterar-status') {
      const ativoAtual = btn.getAttribute('data-ativo') === '1';
      _cfgAlterarStatus(email, !ativoAtual, btn);
    }
  });

  document.body.appendChild(modal);
}

function _menuItemTopo(id, icon, label) {
  return `<button id="cfgNav_${id}" onclick="_abrirSecaoTopo('${id}')"
    class="cfg-nav-item flex-shrink-0 md:w-full text-left text-sm text-gray-400 hover:text-white flex items-center gap-2.5 px-3.5 py-2.5 rounded-lg hover:bg-gray-800 transition font-semibold whitespace-nowrap">
    <i class="fas ${icon} w-4 text-center"></i> <span>${label}</span>
  </button>`;
}

function _cfgAtualizarIdentidade() {
  const nome    = sessionStorage.getItem('vigi_nome')   || '—';
  const perfil  = sessionStorage.getItem('vigi_perfil') || 'ADMIN';
  const avatar  = document.getElementById('cfgAvatarUsuario');
  const nomeEl  = document.getElementById('cfgNomeUsuario');
  const perfilEl = document.getElementById('cfgPerfilUsuario');
  if (avatar)   avatar.textContent   = typeof _gerarIniciais === 'function' ? _gerarIniciais(nome) : nome.substring(0, 2).toUpperCase();
  if (nomeEl)   nomeEl.textContent   = nome;
  if (perfilEl) perfilEl.textContent = perfil;
}

// ─────────────────────────────────────────────────────────
// ROTEAMENTO DAS ABAS PRINCIPAIS (SIDEBAR)
// ─────────────────────────────────────────────────────────
const _SECOES_TOPO = {
  visao_geral:   { label: 'Visão Geral',      render: _renderSecaoVisaoGeral },
  gatilhos:      { label: 'Gatilhos',         render: _renderSecaoGatilhos },
  logs:          { label: 'Logs e Auditoria', render: _renderSecaoLogs },
  configuracoes: { label: 'Configurações',    render: _renderConfiguracoesShell }
};

function _abrirSecaoTopo(secao) {
  document.querySelectorAll('.cfg-nav-item').forEach(b => {
    b.classList.remove('bg-teal-600', 'text-white');
    b.classList.add('text-gray-400');
  });
  const btn = document.getElementById('cfgNav_' + secao);
  if (btn) { btn.classList.add('bg-teal-600', 'text-white'); btn.classList.remove('text-gray-400'); }

  const titulo = document.getElementById('cfgTituloSecao');
  if (titulo && _SECOES_TOPO[secao]) titulo.textContent = _SECOES_TOPO[secao].label;

  const area = document.getElementById('cfgConteudo');
  area.innerHTML = _loadingHtml();
  if (_SECOES_TOPO[secao]) _SECOES_TOPO[secao].render(area);
}

// ─────────────────────────────────────────────────────────
// SEÇÃO — VISÃO GERAL (dashboard resumido)
// ─────────────────────────────────────────────────────────
function _renderSecaoVisaoGeral(area) {
  Promise.all([
    _chamarGS('listarUsuarios', tokenSessao),
    _chamarGS('listarGatilhos', tokenSessao),
    _chamarGS('getConfig', tokenSessao),
    _chamarGS('listarLogsAuditoria', tokenSessao, 6)
  ]).then(([usuarios, gatilhos, cfg, logs]) => {
    const usuariosAtivos = (usuarios  || []).filter(u => u.ativo === 'SIM').length;
    const gatilhosAtivos = (gatilhos  || []).filter(g => g.ativo).length;
    const setores        = (cfg && cfg.setores) || [];
    const sla             = (cfg && cfg.geral && cfg.geral.SLA_PADRAO_HORAS) || '48';

    area.innerHTML = `
      <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2 mb-5">
        <i class="fas fa-gauge-high text-teal-600"></i> Visão Geral do Sistema
      </h2>
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        ${_cardStat('fa-users', 'Usuários Ativos', usuariosAtivos + ' / ' + (usuarios || []).length, 'text-blue-600', 'bg-blue-50')}
        ${_cardStat('fa-pills', 'Gatilhos Ativos', gatilhosAtivos + ' / ' + (gatilhos || []).length, 'text-teal-600', 'bg-teal-50')}
        ${_cardStat('fa-hospital', 'Setores Cadastrados', String(setores.length), 'text-purple-600', 'bg-purple-50')}
        ${_cardStat('fa-clock', 'SLA Padrão', sla + 'h', 'text-orange-600', 'bg-orange-50')}
      </div>
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
        <div class="px-5 py-3.5 border-b border-gray-200 flex items-center justify-between">
          <h3 class="text-sm font-bold text-gray-700 flex items-center gap-2">
            <i class="fas fa-clock-rotate-left text-gray-400"></i> Atividade Recente
          </h3>
          <button onclick="_abrirSecaoTopo('logs')" class="text-xs text-teal-600 hover:text-teal-800 font-semibold">Ver tudo →</button>
        </div>
        <div class="divide-y divide-gray-100">
          ${(logs && logs.length) ? logs.map(l => `
            <div class="px-5 py-3 flex items-center justify-between gap-3 text-sm">
              <div class="min-w-0">
                <p class="font-semibold text-gray-700 truncate">${escapeHtml(l.acao)}</p>
                <p class="text-xs text-gray-400 truncate">${escapeHtml(l.usuario)}${l.idCaso ? ' · ' + escapeHtml(l.idCaso) : ''}</p>
              </div>
              <span class="text-xs text-gray-400 whitespace-nowrap flex-shrink-0">${_fmtDataHora(l.data)}</span>
            </div>`).join('') : `<div class="px-5 py-8 text-center text-gray-400 text-sm">Nenhuma atividade registrada.</div>`}
        </div>
      </div>`;
  }).catch(e => { area.innerHTML = _erroHtml(e.message); });
}

function _cardStat(icon, label, valor, corTexto, corFundo) {
  return `
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 flex items-center gap-3">
      <div class="w-11 h-11 rounded-lg ${corFundo} ${corTexto} flex items-center justify-center flex-shrink-0">
        <i class="fas ${icon}"></i>
      </div>
      <div class="min-w-0">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-wide truncate">${label}</p>
        <p class="text-lg font-bold text-gray-800">${valor}</p>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────
// SEÇÃO — GATILHOS (Gestão de Antídotos — CRUD completo)
// ─────────────────────────────────────────────────────────
function _renderSecaoGatilhos(area) {
  google.script.run
    .withSuccessHandler(gatilhos => {
      _gatCache = gatilhos || [];
      area.innerHTML = `
        <div class="flex items-center justify-between mb-5 gap-3 flex-wrap">
          <div>
            <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
              <i class="fas fa-pills text-teal-600"></i> Gatilhos (Medicamentos Antídoto)
            </h2>
            <p class="text-xs text-gray-400 mt-0.5">Medicamentos monitorados pelo ETL. Alterações refletem na próxima execução do pipeline.</p>
          </div>
          <button onclick="_gatAbrirModal()"
                  class="bg-teal-600 hover:bg-teal-700 text-white font-bold px-4 py-2.5 rounded-lg text-sm flex items-center gap-2 transition shadow-sm">
            <i class="fas fa-plus"></i> Adicionar Novo Gatilho
          </button>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase">Nome do Medicamento</th>
                <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase">Status</th>
                <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase">Última Modificação</th>
                <th class="px-4 py-3 text-xs font-bold text-gray-500 uppercase text-right">Ações</th>
              </tr>
            </thead>
            <tbody id="gatTabelaBody"></tbody>
          </table>
          </div>
        </div>`;
      _gatRenderTabela();
    })
    .withFailureHandler(e => { area.innerHTML = _erroHtml(e.message); })
    .listarGatilhos(tokenSessao);
}

function _gatRenderTabela() {
  const tbody = document.getElementById('gatTabelaBody');
  if (!tbody) return;

  if (!_gatCache.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-gray-400 text-sm">Nenhum gatilho cadastrado.</td></tr>`;
    return;
  }

  tbody.innerHTML = _gatCache.map(g => `
    <tr class="border-b border-gray-100 hover:bg-gray-50 text-sm">
      <td class="px-4 py-3 font-semibold text-gray-800 uppercase">${escapeHtml(g.medicamento)}</td>
      <td class="px-4 py-3">
        <div class="flex items-center gap-2">
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer" ${g.ativo ? 'checked' : ''}
                   onchange="_gatAlternarStatus('${g.id}', this)">
            <div class="w-10 h-5 bg-gray-300 rounded-full peer peer-checked:bg-teal-600 peer-disabled:opacity-50 transition-colors"></div>
            <span class="absolute left-0.5 top-0.5 bg-white w-4 h-4 rounded-full shadow transition-transform peer-checked:translate-x-5"></span>
          </label>
          <span class="text-xs font-bold uppercase ${g.ativo ? 'text-teal-700' : 'text-gray-400'}">${g.ativo ? 'Ativo' : 'Inativo'}</span>
        </div>
      </td>
      <td class="px-4 py-3 text-xs text-gray-500">${_fmtDataHora(g.atualizadoEm)}</td>
      <td class="px-4 py-3">
        <div class="flex justify-end gap-2">
          <button onclick="_gatAbrirModal('${g.id}')"
                  class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold px-2.5 py-1.5 rounded-lg transition">
            <i class="fas fa-pen mr-1"></i>Editar
          </button>
          <button onclick="_gatExcluir('${g.id}', this)"
                  class="text-xs bg-red-50 hover:bg-red-100 text-red-600 font-semibold px-2.5 py-1.5 rounded-lg transition">
            <i class="fas fa-trash mr-1"></i>Excluir
          </button>
        </div>
      </td>
    </tr>`).join('');
}

function _gatAlternarStatus(id, checkbox) {
  checkbox.disabled = true;
  const novoAtivo = checkbox.checked;
  google.script.run
    .withSuccessHandler(res => {
      checkbox.disabled = false;
      mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro');
      if (res.sucesso) {
        const item = _gatCache.find(x => x.id === id);
        if (item) { item.ativo = novoAtivo; item.atualizadoEm = new Date(); }
        _gatRenderTabela();
      } else {
        checkbox.checked = !novoAtivo;
      }
    })
    .withFailureHandler(e => {
      checkbox.disabled = false;
      checkbox.checked  = !novoAtivo;
      mostrarToast(e.message, 'erro');
    })
    .alternarStatusGatilho(id, novoAtivo, tokenSessao);
}

function _gatAbrirModal(id) {
  const editando = !!id;
  const atual    = editando ? _gatCache.find(x => x.id === id) : null;

  _cfgAbrirSubModal(editando ? 'Editar Gatilho' : 'Novo Gatilho', `
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-gray-600 mb-1">Nome do Medicamento *</label>
        <input type="text" id="gatModalNome" style="text-transform:uppercase" value="${atual ? escapeHtml(atual.medicamento) : ''}"
               placeholder="EX: FLUMAZENIL"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm uppercase focus:ring-2 focus:ring-teal-500 outline-none">
      </div>
      <div class="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-lg px-3.5 py-2.5">
        <span class="text-xs font-bold text-gray-600">Status</span>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="gatModalAtivo" class="sr-only peer" ${(!atual || atual.ativo) ? 'checked' : ''}>
          <div class="w-10 h-5 bg-gray-300 rounded-full peer peer-checked:bg-teal-600 transition-colors"></div>
          <span class="absolute left-0.5 top-0.5 bg-white w-4 h-4 rounded-full shadow transition-transform peer-checked:translate-x-5"></span>
        </label>
      </div>
    </div>`,
    editando ? 'Salvar' : 'Criar Gatilho', () => {
      const nome  = document.getElementById('gatModalNome').value.trim();
      const ativo = document.getElementById('gatModalAtivo').checked;
      if (!nome) { mostrarToast('Informe o nome do medicamento.', 'erro'); return; }

      const btn = document.getElementById('cfgSubModalBtn');
      _iniciarCarregando(btn);
      google.script.run
        .withSuccessHandler(res => {
          _pararCarregando(btn);
          mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro');
          if (res.sucesso) { _fecharSubModal(); _renderSecaoGatilhos(document.getElementById('cfgConteudo')); }
        })
        .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
        .salvarGatilho({ id: atual ? atual.id : '', medicamento: nome, ativo: ativo }, tokenSessao);
    });
}

// CORREÇÃO (auditoria_qa_datas_tipagem_2026-07-13.md, Seção C #1): era a
// única ação de escrita do painel admin sem estado de carregamento — o
// botão "Excluir" ficava clicável durante toda a chamada, permitindo um
// duplo clique disparar duas exclusões/logs de auditoria concorrentes para
// o mesmo gatilho.
function _gatExcluir(id, btn) {
  const item = _gatCache.find(x => x.id === id);
  const nome = item ? item.medicamento : id;
  if (!confirm(`Confirma excluir o gatilho "${nome}"? Esta ação não pode ser desfeita.`)) return;

  const originalHtml = btn ? btn.innerHTML : '';
  if (btn) {
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>';
    btn.disabled  = true;
  }

  google.script.run
    .withSuccessHandler(res => {
      // Em sucesso a tabela inteira é re-renderizada (_renderSecaoGatilhos),
      // então este botão específico deixa de existir — nada para restaurar.
      mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro');
      if (res.sucesso) {
        _renderSecaoGatilhos(document.getElementById('cfgConteudo'));
      } else if (btn) {
        btn.innerHTML = originalHtml;
        btn.disabled  = false;
      }
    })
    .withFailureHandler(e => {
      if (btn) {
        btn.innerHTML = originalHtml;
        btn.disabled  = false;
      }
      mostrarToast(e.message, 'erro');
    })
    .excluirGatilho(id, tokenSessao);
}

// ─────────────────────────────────────────────────────────
// SEÇÃO — LOGS E AUDITORIA (somente leitura)
// ─────────────────────────────────────────────────────────
function _renderSecaoLogs(area) {
  google.script.run
    .withSuccessHandler(logs => {
      area.innerHTML = `
        <div class="flex items-center justify-between mb-5 gap-3 flex-wrap">
          <div>
            <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
              <i class="fas fa-clipboard-list text-teal-600"></i> Logs e Auditoria
            </h2>
            <p class="text-xs text-gray-400 mt-0.5">Histórico somente leitura das últimas ${(logs || []).length} ações registradas no sistema.</p>
          </div>
          <button onclick="_abrirSecaoTopo('logs')"
                  class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold px-3 py-2 rounded-lg transition flex items-center gap-1.5">
            <i class="fas fa-rotate"></i> Atualizar
          </button>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
          <div class="overflow-y-auto overflow-x-auto max-h-[62vh]">
            <table class="w-full text-left text-xs">
              <thead class="bg-gray-50 border-b border-gray-200 sticky top-0">
                <tr>
                  <th class="px-3 py-2.5 font-bold text-gray-500 uppercase">Data/Hora</th>
                  <th class="px-3 py-2.5 font-bold text-gray-500 uppercase">Usuário</th>
                  <th class="px-3 py-2.5 font-bold text-gray-500 uppercase">Ação</th>
                  <th class="px-3 py-2.5 font-bold text-gray-500 uppercase">Caso</th>
                  <th class="px-3 py-2.5 font-bold text-gray-500 uppercase">Detalhe</th>
                </tr>
              </thead>
              <tbody>${_logsLinhasHtml(logs)}</tbody>
            </table>
          </div>
        </div>`;
    })
    .withFailureHandler(e => { area.innerHTML = _erroHtml(e.message); })
    .listarLogsAuditoria(tokenSessao, 300);
}

function _logsLinhasHtml(logs) {
  if (!logs || !logs.length) {
    return `<tr><td colspan="5" class="px-3 py-8 text-center text-gray-400">Nenhum registro encontrado.</td></tr>`;
  }
  return logs.map(l => `
    <tr class="border-b border-gray-100 hover:bg-gray-50">
      <td class="px-3 py-2 text-gray-500 whitespace-nowrap">${_fmtDataHora(l.data)}</td>
      <td class="px-3 py-2 text-gray-700 font-medium">${escapeHtml(l.usuario || '—')}</td>
      <td class="px-3 py-2"><span class="bg-gray-100 text-gray-700 font-bold px-1.5 py-0.5 rounded">${escapeHtml(l.acao || '—')}</span></td>
      <td class="px-3 py-2 text-gray-500">${escapeHtml(l.idCaso || '—')}</td>
      <td class="px-3 py-2 text-gray-400">${escapeHtml(l.detalhe || '—')}</td>
    </tr>`).join('');
}

// ─────────────────────────────────────────────────────────
// SEÇÃO — CONFIGURAÇÕES (sub-navegação: Usuários/E-mails/SLA/Setores/Listas)

const _SUBSECOES_CONFIG = {
  usuarios: { label: 'Usuários',           icon: 'fa-users',    render: _renderSecaoUsuarios },
  emails:   { label: 'E-mails de Alerta',  icon: 'fa-envelope', render: _renderSecaoEmails },
  sla:      { label: 'SLA',                icon: 'fa-clock',    render: _renderSecaoSLA },
  setores:  { label: 'Setores',            icon: 'fa-hospital', render: _renderSecaoSetores },
  listas:   { label: 'Listas / Dropdowns', icon: 'fa-list',     render: _renderSecaoListas }
};

function _renderConfiguracoesShell(area) {
  area.innerHTML = `
    <div class="flex items-center gap-1 mb-6 border-b border-gray-200 overflow-x-auto">
      ${Object.entries(_SUBSECOES_CONFIG).map(([id, s]) => `
        <button id="cfgSub_${id}" onclick="_abrirSubConfig('${id}')"
                class="cfg-subnav-item whitespace-nowrap text-sm font-semibold px-4 py-2.5 border-b-2 border-transparent text-gray-400 hover:text-gray-700 transition flex items-center gap-2">
          <i class="fas ${s.icon} text-xs"></i> ${s.label}
        </button>`).join('')}
    </div>
    <div id="cfgSubConteudo">${_loadingHtml()}</div>`;
  _abrirSubConfig('usuarios');
}

function _abrirSubConfig(id) {
  document.querySelectorAll('.cfg-subnav-item').forEach(b => {
    b.classList.remove('border-teal-600', 'text-teal-700');
    b.classList.add('text-gray-400', 'border-transparent');
  });
  const btn = document.getElementById('cfgSub_' + id);
  if (btn) { btn.classList.add('border-teal-600', 'text-teal-700'); btn.classList.remove('text-gray-400', 'border-transparent'); }

  const area = document.getElementById('cfgSubConteudo');
  if (!area) return;
  area.innerHTML = _loadingHtml();
  if (_SUBSECOES_CONFIG[id]) _SUBSECOES_CONFIG[id].render(area);
}

/**
 * Monta o HTML da lista de setores (busca + checkbox por setor, em grade de
 * 2 colunas + campo para adicionar um setor novo na hora) usada tanto no
 * cadastro quanto na edição de usuário. `selecionados` marca os setores já
 * atribuídos. A lista fica em altura fixa com rolagem PRÓPRIA (max-h-52
 * overflow-y-auto) para nunca "estourar" o modal, mesmo com dezenas de
 * setores — os botões Cancelar/Salvar continuam sempre visíveis porque o
 * modal (_cfgAbrirSubModal) tem cabeçalho/rodapé fixos e só o corpo rola.
 */
function _cfgHtmlCheckboxesSetores(distintos, selecionados) {
  const marcados = new Set((selecionados || []).map(s => String(s).toUpperCase()));
  distintos.forEach(s => marcados.add(s)); // garante que setores só do usuário também apareçam
  const todos = Array.from(marcados).sort((a, b) => a.localeCompare(b));

  // Nome do setor por extenso, sem cortar: "truncate" (Tailwind) escondia o
  // final do nome com "..." em setores com nome mais longo — trocado por
  // quebra de linha (break-words), com o checkbox alinhado ao topo pra não
  // ficar descentralizado quando o texto ocupa 2 linhas.
  const itens = todos.map(s => `
    <label class="cfgUsSetorLinha flex items-start gap-2 text-sm py-1 cursor-pointer rounded px-1 hover:bg-gray-50" data-nome="${escapeHtml(s)}">
      <input type="checkbox" class="cfgUsSetorChk flex-shrink-0 mt-0.5" value="${escapeHtml(s)}"
             onchange="_cfgUsAtualizarContagemSetores()"
             ${(selecionados || []).map(x => String(x).toUpperCase()).includes(s) ? 'checked' : ''}>
      <span class="break-words">${escapeHtml(s)}</span>
    </label>`).join('');

  return `
    <div class="flex items-center gap-2 mb-2">
      <div class="relative flex-1">
        <i class="fas fa-search text-gray-300 text-xs absolute left-3 top-1/2 -translate-y-1/2"></i>
        <input type="text" id="cfgUsFiltroSetor" placeholder="Buscar setor…" oninput="_cfgUsFiltrarSetores(this.value)"
               class="w-full border border-gray-300 rounded-lg pl-8 pr-3 py-1.5 text-xs focus:ring-2 focus:ring-teal-500 outline-none">
      </div>
      <span id="cfgUsSetorContagem" class="text-xs text-gray-400 whitespace-nowrap flex-shrink-0">0 selecionado(s)</span>
    </div>
    <div id="cfgUsSetoresLista" class="max-h-52 overflow-y-auto border border-gray-200 rounded-lg px-2 py-1.5 mb-2 grid grid-cols-1 sm:grid-cols-2 gap-x-3 content-start">
      ${itens || ''}
    </div>
    <p id="cfgUsSetorVazio" class="text-xs text-gray-400 mb-2 ${todos.length ? 'hidden' : ''}">Nenhum setor cadastrado ainda — adicione um abaixo.</p>
    <div class="flex gap-2">
      <input type="text" id="cfgUsNovoSetor" placeholder="Adicionar setor novo…"
             onkeydown="if(event.key==='Enter'){event.preventDefault();_cfgUsAdicionarSetorNaLista();}"
             class="flex-1 border border-gray-300 rounded-lg px-3 py-1.5 text-xs focus:ring-2 focus:ring-teal-500 outline-none">
      <button type="button" onclick="_cfgUsAdicionarSetorNaLista()"
              class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-3 py-1.5 rounded-lg transition">
        <i class="fas fa-plus"></i>
      </button>
    </div>`;
}

/** Adiciona um checkbox novo (já marcado) à lista do modal de usuário, sem precisar salvar antes na aba Setores. */
function _cfgUsAdicionarSetorNaLista() {
  const input = document.getElementById('cfgUsNovoSetor');
  const nome = (input.value || '').trim().toUpperCase();
  if (!nome) return;

  const lista = document.getElementById('cfgUsSetoresLista');
  const existentes = Array.from(lista.querySelectorAll('.cfgUsSetorChk')).map(c => c.value);
  if (existentes.includes(nome)) { input.value = ''; return; }

  // Aviso de grafia parecida (evita recriar a duplicação já corrigida em
  // "Verificar Duplicados" — ex.: usuário digita "UTI-Adulto" quando já
  // existe "UTI ADULTO" na lista). Não bloqueia: o admin pode confirmar
  // que é mesmo um setor novo e distinto.
  const chaveNova = normalizarSetorComparacao(nome);
  const parecido = existentes.find(e => normalizarSetorComparacao(e) === chaveNova && e !== nome);
  if (parecido && !confirm(`Já existe um setor parecido: "${parecido}".\n\nTem certeza que "${nome}" é um setor DIFERENTE? Se for o mesmo, cancele e selecione "${parecido}" na lista em vez de criar um novo.`)) {
    return;
  }

  const label = document.createElement('label');
  label.className = 'cfgUsSetorLinha flex items-start gap-2 text-sm py-1 cursor-pointer rounded px-1 hover:bg-gray-50';
  label.dataset.nome = nome;
  label.innerHTML = `<input type="checkbox" class="cfgUsSetorChk flex-shrink-0 mt-0.5" value="${escapeHtml(nome)}" onchange="_cfgUsAtualizarContagemSetores()" checked> <span class="break-words">${escapeHtml(nome)}</span>`;
  lista.appendChild(label);

  document.getElementById('cfgUsSetorVazio').classList.add('hidden');
  input.value = '';
  document.getElementById('cfgUsFiltroSetor').value = '';
  _cfgUsFiltrarSetores('');
  _cfgUsAtualizarContagemSetores();
}

/** Filtra as linhas de setor pelo texto digitado na busca (case-insensitive, substring). */
function _cfgUsFiltrarSetores(termo) {
  const alvo = (termo || '').trim().toUpperCase();
  document.querySelectorAll('.cfgUsSetorLinha').forEach(linha => {
    const combina = !alvo || linha.dataset.nome.includes(alvo);
    linha.classList.toggle('hidden', !combina);
  });
}

function _cfgUsAtualizarContagemSetores() {
  const span = document.getElementById('cfgUsSetorContagem');
  if (span) span.textContent = _cfgSetoresSelecionados().length + ' selecionado(s)';
}

function _cfgSetoresSelecionados() {
  return Array.from(document.querySelectorAll('.cfgUsSetorChk:checked')).map(c => c.value);
}

/** Busca os nomes distintos de setor já cadastrados (aba Setores) para montar as checkboxes. */
function _cfgSetoresDistintos(callback) {
  google.script.run
    .withSuccessHandler(cfg => {
      const nomes = Array.from(new Set((cfg.setores || []).map(s => String(s.setor || '').toUpperCase()))).filter(Boolean);
      callback(nomes);
    })
    .withFailureHandler(() => callback([]))
    .getConfig(tokenSessao);
}

  _cfgSetoresDistintos(distintos => {
    _cfgAbrirSubModal('Novo Usuário', `
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">E-mail *</label>
          <input type="email" id="cfgNuEmail" placeholder="usuario@isgh.org.br"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">Nome completo *</label>
          <input type="text" id="cfgNuNome"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">Senha (mín. 8 caracteres) *</label>
          <input type="password" id="cfgNuSenha"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">Perfil *</label>
          <select id="cfgNuPerfil" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-teal-500 outline-none">
            <option value="FARMACEUTICO">Farmacêutico</option>
            <option value="ADMIN">Administrador</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">Setores que é responsável</label>
          <p class="text-xs text-gray-400 mb-2">O nome deste usuário migra automaticamente para a aba Setores — não precisa digitar de novo lá.</p>
          ${_cfgHtmlCheckboxesSetores(distintos, [])}
        </div>
      </div>`,
      'Criar Usuário', () => {
        const dados = {
          email:   document.getElementById('cfgNuEmail').value.trim(),
          nome:    document.getElementById('cfgNuNome').value.trim(),
          senha:   document.getElementById('cfgNuSenha').value.trim(),
          perfil:  document.getElementById('cfgNuPerfil').value,
          setores: _cfgSetoresSelecionados()
        };
        if (!dados.email || !dados.nome || !dados.senha) { mostrarToast('Preencha todos os campos.', 'erro'); return; }
        if (dados.senha.length < 8) { mostrarToast('Senha deve ter ao menos 8 caracteres.', 'erro'); return; }

        const btn = document.getElementById('cfgSubModalBtn');
        _iniciarCarregando(btn);
        google.script.run
          .withSuccessHandler(res => {
            _pararCarregando(btn);
            mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro');
            if (res.sucesso) { _fecharSubModal(); _abrirSubConfig('usuarios'); }
          })
          .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
          .criarUsuario(dados, tokenSessao);
      });
    _cfgUsAtualizarContagemSetores();
  });
}

function _cfgEditarUsuario(email) {
  const usuario = _usuariosCache.find(u => u.email === email);
  if (!usuario) { mostrarToast('Usuário não encontrado.', 'erro'); return; }

  _cfgSetoresDistintos(distintos => {
    _cfgAbrirSubModal('Editar Usuário', `
      <div class="space-y-4">
        <p class="text-xs text-gray-400">${escapeHtml(usuario.email)}</p>
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">Nome completo *</label>
          <input type="text" id="cfgEuNome" value="${escapeHtml(usuario.nome)}"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">Perfil *</label>
          <select id="cfgEuPerfil" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-teal-500 outline-none">
            <option value="FARMACEUTICO" ${usuario.perfil === 'FARMACEUTICO' ? 'selected' : ''}>Farmacêutico</option>
            <option value="ADMIN" ${usuario.perfil === 'ADMIN' ? 'selected' : ''}>Administrador</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">Setores que é responsável</label>
          <p class="text-xs text-gray-400 mb-2">O nome deste usuário migra automaticamente para a aba Setores — não precisa digitar de novo lá.</p>
          ${_cfgHtmlCheckboxesSetores(distintos, usuario.setores)}
        </div>
      </div>`,
      'Salvar', () => {
        const dados = {
          email:   usuario.email,
          nome:    document.getElementById('cfgEuNome').value.trim(),
          perfil:  document.getElementById('cfgEuPerfil').value,
          setores: _cfgSetoresSelecionados()
        };
        if (!dados.nome) { mostrarToast('Informe o nome.', 'erro'); return; }

        const btn = document.getElementById('cfgSubModalBtn');
        _iniciarCarregando(btn);
        google.script.run
          .withSuccessHandler(res => {
            _pararCarregando(btn);
            mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro');
            if (res.sucesso) { _fecharSubModal(); _abrirSubConfig('usuarios'); }
          })
          .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
          .editarUsuario(dados, tokenSessao);
      });
    _cfgUsAtualizarContagemSetores();
  });
}

function _cfgResetSenha(email) {
  _cfgAbrirSubModal('Redefinir Senha', `
    <p class="text-xs text-gray-400 mb-4">${escapeHtml(email)}</p>
    <div>
      <label class="block text-xs font-bold text-gray-600 mb-1">Nova senha (mín. 8 caracteres) *</label>
      <input type="password" id="cfgRsSenha"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 outline-none">
    </div>`,
    'Salvar', () => {
      const senha = document.getElementById('cfgRsSenha').value.trim();
      if (senha.length < 8) { mostrarToast('Senha deve ter ao menos 8 caracteres.', 'erro'); return; }

      const btn = document.getElementById('cfgSubModalBtn');
      _iniciarCarregando(btn);
      google.script.run
        .withSuccessHandler(res => { _pararCarregando(btn); mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro'); if (res.sucesso) _fecharSubModal(); })
        .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
        .trocarSenhaUsuario(email, senha, tokenSessao);
    });
}

function _cfgAlterarStatus(email, novoAtivo, btn) {
  if (!confirm(`Confirma ${novoAtivo ? 'ativar' : 'desativar'} o usuário ${email}?`)) return;
  _iniciarCarregando(btn);
  google.script.run
    .withSuccessHandler(res => { _pararCarregando(btn); mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro'); if (res.sucesso) _abrirSubConfig('usuarios'); })
    .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
    .alterarStatusUsuario(email, novoAtivo, tokenSessao);
}

/** Botão-toggle: aplica a mudança na hora (sem passar pelo fluxo de "Salvar"). */
function _cfgAlternarAlertas(btn) {
  if (btn.dataset.carregando === '1') return;
  const ativoAtual = btn.dataset.ativo !== 'NAO';
  const novoValor  = ativoAtual ? 'NAO' : 'SIM';

  btn.dataset.carregando = '1';
  btn.disabled = true;
  btn.classList.add('opacity-60', 'cursor-not-allowed');

  google.script.run
    .withSuccessHandler(res => {
      btn.dataset.carregando = '0';
      btn.disabled = false;
      btn.classList.remove('opacity-60', 'cursor-not-allowed');
      if (!res.sucesso) { mostrarToast(res.mensagem, 'erro'); return; }

      btn.dataset.ativo = novoValor;
      const knob = btn.querySelector('span');
      if (novoValor === 'NAO') {
        btn.classList.remove('bg-teal-600'); btn.classList.add('bg-gray-300');
        knob.classList.remove('translate-x-7'); knob.classList.add('translate-x-1');
        btn.title = 'Clique para ativar';
      } else {
        btn.classList.remove('bg-gray-300'); btn.classList.add('bg-teal-600');
        knob.classList.remove('translate-x-1'); knob.classList.add('translate-x-7');
        btn.title = 'Clique para desativar';
      }
      invalidarConfigCache();
      mostrarToast(`Alertas por e-mail ${novoValor === 'SIM' ? 'ativados' : 'desativados'}.`, 'sucesso');
    })
    .withFailureHandler(e => {
      btn.dataset.carregando = '0';
      btn.disabled = false;
      btn.classList.remove('opacity-60', 'cursor-not-allowed');
      mostrarToast(e.message, 'erro');
    })
    .salvarConfigGeral({ ALERTAS_ATIVOS: novoValor }, tokenSessao);
}

function _cfgAdicionarSetor() {

  tbody.insertAdjacentHTML('beforeend', _cfgHtmlLinhaSetor(i, '', '', ''));
  const novaLinha = document.getElementById('setorLinha_' + i);
  novaLinha.querySelector('input').focus();
}

function _cfgRemoverSetor(idx) {
  const linha = document.getElementById('setorLinha_' + idx);
  if (linha) linha.remove();
}

/**
 * Expande as linhas agrupadas (1 por setor, farmacêutico/e-mail separados
 * por vírgula) de volta em pares individuais {setor, farmaceutico, email}
 * — o formato que salvarSetores (Config write.gs) já espera, 1 documento
 * por par. Pareia por POSIÇÃO: o N-ésimo nome vai com o N-ésimo e-mail, na
 * ordem em que foram digitados — por isso a dica de "mesma ordem" na tela.
 */
function _cfgExpandirLinhasSetores(tbody) {
  const setores = [];
  let erro = null;

  tbody.querySelectorAll('tr').forEach(tr => {
    if (erro) return;
    const campos = {};
    tr.querySelectorAll('input[data-campo]').forEach(inp => { campos[inp.dataset.campo] = inp.value.trim(); });
    if (!campos.setor) return;

    const nomes  = campos.farmaceutico ? campos.farmaceutico.split(',').map(s => s.trim()).filter(Boolean) : [];
    const emails = campos.email        ? campos.email.split(',').map(s => s.trim()).filter(Boolean)        : [];

    if (nomes.length !== emails.length) {
      erro = `Setor "${campos.setor}": ${nomes.length} farmacêutico(s) e ${emails.length} e-mail(s) não batem. Separe cada farmacêutico e seu e-mail por vírgula, na mesma ordem.`;
      return;
    }

    if (!nomes.length) {
      setores.push({ setor: campos.setor, farmaceutico: '', email: '' });
    } else {
      nomes.forEach((nome, i) => setores.push({ setor: campos.setor, farmaceutico: nome, email: emails[i] }));
    }
  });

  return { setores, erro };
}

function _cfgSalvarSetores(btn) {
  const tbody = document.getElementById('setoresBody');
  if (!tbody) return;

  const { setores, erro } = _cfgExpandirLinhasSetores(tbody);
  if (erro) { mostrarToast(erro, 'erro'); return; }
  if (!setores.length) { mostrarToast('Adicione ao menos um setor.', 'erro'); return; }

  _iniciarCarregando(btn);
  google.script.run
    .withSuccessHandler(res => { _pararCarregando(btn); mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro'); if (res.sucesso) invalidarConfigCache(); })
    .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
    .salvarSetores(setores, tokenSessao);
}

// ─────────────────────────────────────────────────────────
// CONFIGURAÇÕES · SETORES · DIAGNÓSTICO DE DUPLICADOS
//
// Duplicata real (mesmo setor físico, mesmo responsável) só acontece
// quando a mesma pessoa/setor foi digitada com grafias levemente
// diferentes em edições distintas (maiúsc./minúsc., espaço extra, acento
// com codificação diferente ao colar de Word/Excel etc.) — cada grafia
// vira um documento próprio na coleção `setores` (id = setor+e-mail), sem
// nunca se auto-mesclar. Este painel agrupa por uma chave normalizada
// (sem acento, maiúsculo, espaços colapsados) + e-mail do responsável,
// mostra os grupos com mais de 1 grafia pro admin escolher o nome
// canônico, e só mescla quando o admin confirma — nada é apagado
// automaticamente sem revisão.
// ─────────────────────────────────────────────────────────

function _cfgVerificarSetoresDuplicados(btn) {
  _iniciarCarregando(btn);
  google.script.run
    .withSuccessHandler(res => {
      _pararCarregando(btn);
      if (!res.duplicados.length) {
        mostrarToast(`Nenhum setor duplicado encontrado (${res.totalSetores} documento(s), ${res.totalGrupos} setor(es) distinto(s)).`, 'sucesso');
        return;
      }
      _cfgAbrirSubModal(
        `${res.duplicados.length} Grupo(s) Duplicado(s)`,
        `<p class="text-xs text-gray-500 mb-4">Escolha a grafia correta de cada grupo. As demais serão apagadas e os usuários que tinham a grafia antiga atribuída passam a usar a escolhida.</p>
         <div id="cfgDupGrupos" class="space-y-4">
           ${res.duplicados.map((g, i) => _cfgHtmlGrupoDuplicado(g, i)).join('')}
         </div>`,
        'Mesclar Selecionados',
        () => _cfgMesclarSetoresDuplicados(res.duplicados)
      );
    })
    .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
    .diagnosticarSetoresDuplicados(tokenSessao);
}

function _cfgHtmlGrupoDuplicado(grupo, idx) {
  // Sugestão de padrão: a grafia que mais se repete no grupo (ou a
  // primeira, em empate) — o admin pode trocar por outra do grupo.
  const contagem = {};
  grupo.forEach(d => { contagem[d.setor] = (contagem[d.setor] || 0) + 1; });
  const sugestao = grupo.slice().sort((a, b) => (contagem[b.setor] - contagem[a.setor]))[0].setor;

  const opcoes = grupo.map((d, j) => `
    <label class="flex items-center gap-2 text-sm py-1 cursor-pointer">
      <input type="radio" name="cfgDupCanonico_${idx}" value="${escapeHtml(d.setor)}" ${d.setor === sugestao ? 'checked' : ''}>
      <span>${escapeHtml(d.setor)}</span>
      <span class="text-xs text-gray-400">(id: ${escapeHtml(d.id)})</span>
    </label>`).join('');

  return `
    <div class="border border-amber-200 bg-amber-50 rounded-lg p-3" data-grupo-idx="${idx}">
      <p class="text-xs font-bold text-gray-600 mb-1">
        <i class="fas fa-user-md text-gray-400"></i> ${escapeHtml(grupo[0].farmaceutico || 'N/I')}
        <span class="text-gray-400 font-normal">(${escapeHtml(grupo[0].email || 'sem e-mail')})</span>
      </p>
      ${opcoes}
    </div>`;
}

function _cfgMesclarSetoresDuplicados(duplicados) {
  const btn = document.getElementById('cfgSubModalBtn');
  const payload = duplicados.map((grupo, idx) => {
    const radio = document.querySelector(`input[name="cfgDupCanonico_${idx}"]:checked`);
    const nomeCanonico = radio ? radio.value : grupo[0].setor;
    return {
      email: grupo[0].email,
      farmaceutico: grupo[0].farmaceutico,
      nomeCanonico: nomeCanonico,
      idsAntigos: grupo.map(d => d.id),
      grafias: grupo.map(d => d.setor)
    };
  });

  _iniciarCarregando(btn);
  google.script.run
    .withSuccessHandler(res => {
      _pararCarregando(btn);
      mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro');
      if (res.sucesso) { _fecharSubModal(); invalidarConfigCache(); _abrirSubConfig('setores'); }
    })
    .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
    .mesclarSetoresDuplicados(payload, tokenSessao);
}

  });
  _iniciarCarregando(btn);
  google.script.run
    .withSuccessHandler(res => { _pararCarregando(btn); mostrarToast(res.mensagem, res.sucesso ? 'sucesso' : 'erro'); if (res.sucesso) invalidarConfigCache(); })
    .withFailureHandler(e => { _pararCarregando(btn); mostrarToast(e.message, 'erro'); })
    .salvarListas(listas, tokenSessao);
}

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function _loadingHtml() {
  return `<div class="flex items-center justify-center h-40 text-gray-400">
    <i class="fas fa-spinner fa-spin mr-2"></i> Carregando…</div>`;
}

function _erroHtml(msg) {
  return `<div class="flex flex-col items-center justify-center h-40 text-red-400">
    <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
    <p class="text-sm">${escapeHtml(msg)}</p>
  </div>`;
}

/** Formata Date/ISO em dd/mm/aaaa HH:mm, com fallback para valores ausentes. */
function _fmtDataHora(d) {
  if (!d) return '—';
  const dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt.getTime())) return '—';
  const pad = n => String(n).padStart(2, '0');
  return `${pad(dt.getDate())}/${pad(dt.getMonth() + 1)}/${dt.getFullYear()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
}

/** Invalida o cache de config no servidor para refletir edições imediatamente. */
function invalidarConfigCache() {
  google.script.run
    .withFailureHandler(e => console.warn('invalidarConfig falhou — config pode ficar em cache até 10min:', e.message))
    .invalidarConfig();
}

/** Promisifica google.script.run para permitir Promise.all() em telas com múltiplas fontes (ex: Visão Geral). */
function _chamarGS(nomeFuncao, ...args) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      [nomeFuncao](...args);
  });
}

/** Coloca um botão em estado de carregamento (spinner + disabled) — evita cliques duplos que corrompem o banco. */
function _iniciarCarregando(btn) {
  if (!btn || btn.dataset.carregando === '1') return;
  btn.dataset.carregando   = '1';
  btn.dataset.originalHtml = btn.innerHTML;
  btn.disabled = true;
  btn.classList.add('opacity-60', 'cursor-not-allowed');
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Salvando…';
}

function _pararCarregando(btn) {
  if (!btn) return;
  btn.disabled = false;
  btn.dataset.carregando = '0';
  btn.classList.remove('opacity-60', 'cursor-not-allowed');
  if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
}

/**
 * Sub-modal reutilizável para formulários pequenos dentro do modal de config.
 * Cabeçalho e rodapé (Cancelar/Salvar) ficam FIXOS; só o corpo (`conteudo`)
 * rola — assim, formulários mais longos (ex.: lista de setores) nunca
 * empurram os botões para fora da tela nem "estouram" o modal, em qualquer
 * altura de viewport (max-h-[92vh] com folga de 4vh para a margem do overlay).
 */
function _cfgAbrirSubModal(titulo, conteudo, labelBtn, onConfirmar) {
  const anterior = document.getElementById('cfgSubModal');
  if (anterior) anterior.remove();
  const div = document.createElement('div');
  div.id = 'cfgSubModal';
  div.className = 'absolute inset-0 bg-black/50 flex items-center justify-center z-10 sm:rounded-2xl p-4';
  div.innerHTML = `
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm max-h-[92vh] flex flex-col fade-in">
      <h3 class="text-base font-bold text-gray-800 px-6 pt-6 pb-3 border-b flex-shrink-0">${escapeHtml(titulo)}</h3>
      <div class="px-6 py-4 overflow-y-auto flex-1 min-h-0">${conteudo}</div>
      <div class="flex justify-end gap-3 px-6 pb-6 pt-3 border-t flex-shrink-0">
        <button onclick="_fecharSubModal()"
                class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-semibold text-sm hover:bg-gray-200 transition">
          Cancelar
        </button>
        <button id="cfgSubModalBtn"
                class="px-4 py-2 bg-teal-600 text-white rounded-lg font-semibold text-sm hover:bg-teal-700 transition min-w-[110px] flex items-center justify-center gap-2">
          ${escapeHtml(labelBtn)}
        </button>
      </div>
    </div>`;
  const painel = document.getElementById('modalConfig').querySelector('.relative');
  painel.appendChild(div);
  document.getElementById('cfgSubModalBtn').onclick = onConfirmar;
}

function _fecharSubModal() {
  const sub = document.getElementById('cfgSubModal');
  if (sub) sub.remove();
}
</script>
