<script>
/**
 * @fileoverview js_dashboard.html
 * Responsabilidade: EXCLUSIVAMENTE o dashboard de gestão.
 *
 * REVISÃO 07/2026 — Reestruturação em blocos temáticos (Visão Geral,
 * Análise Clínica e Tendência, Mapa de Risco, Desempenho Operacional):
 *   - Bloco 1 agora separa Gatilhos (tipo BA) de Notificações Espontâneas
 *     (tipo DE) — antes eram somados num "Total Rastreado" genérico, o que
 *     escondia a diferença entre robô/ETL e notificação da assistência.
 *   - "Pendência de Importação" e o estágio "Importado VigiMed" do funil
 *     exigem numVigimed E dataVigimed preenchidos — número sem data (ou
 *     vice-versa) ainda conta como pendente.
 *   - Naranjo e Prevenibilidade foram avaliados e descartados desta versão:
 *     os campos não são expostos por _mapearCasoResumo_ (Cases.gs) hoje;
 *     reintroduzir exige mudança de backend (fora de escopo aqui).
 *   - Funil de Conformidade tem só 3 estágios (Notificação → RAM Confirmada
 *     → Importado VigiMed); "Exportado E2B" ficou de fora por depender de
 *     um carimbo de data que hoje só existe em log de auditoria separado,
 *     não no documento do caso.
 *   - Gráfico "Setores com Mais Eventos" (Total Rastreado × Concluídos) foi
 *     removido — redundante com a nova Evolução Temporal + Ranking por
 *     Setor.
 *
 * Depende de: js_core (casosGlobais, STATUS, escapeHtml,
 *   getFarmaceuticoPorSetor, SLA_PADRAO_HORAS, formatarTempoSLA,
 *   parseDataFlexivel, parseDataFiltroLimite)
 */

// Instâncias dos gráficos (necessárias para destruir antes de redesenhar)
let _grafTemporal = null;
let _grafDesfechos = null;
let _grafGravidade = null;
let _grafGravidadeSetor = null;
let _grafMedicamentos = null;
let _grafFunil = null;

// ---------------------------------------------------------
// MÊS FECHADO — atalho na barra de filtros global
// ---------------------------------------------------------
function _popularFiltroMesFechado() {
  const sel = document.getElementById('filtroMesFechado');
  if (!sel) return;
  const hoje = new Date();
  const opcoes = ['<option value="">Mês (personalizado)</option>'];
  for (let i = 1; i <= 6; i++) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
    const label = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    opcoes.push(`<option value="${d.getFullYear()}-${d.getMonth()}">${label.charAt(0).toUpperCase()}${label.slice(1)}</option>`);
  }
  sel.innerHTML = opcoes.join('');
}
document.addEventListener('DOMContentLoaded', _popularFiltroMesFechado);

function _limparMesFechado() {
  const sel = document.getElementById('filtroMesFechado');
  if (sel) sel.value = '';
}

function _isoDataLocal(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function _aplicarMesFechado() {
  const sel = document.getElementById('filtroMesFechado');
  if (!sel || !sel.value) return;
  const [ano, mes] = sel.value.split('-').map(Number);
  document.getElementById('filtroDe').value  = _isoDataLocal(new Date(ano, mes, 1));
  document.getElementById('filtroAte').value = _isoDataLocal(new Date(ano, mes + 1, 0));
  processarFiltros();
}

// Lógica de filtro combinada, herdando as regras idênticas ao js_kanban
function obterDadosFiltradosDash() {
  const setor = document.getElementById('filtroSetor').value;
  const farmaceut = document.getElementById('filtroFarmaceutico').value;
  const dataDe = document.getElementById('filtroDe').value;
  const dataAte = document.getElementById('filtroAte').value;

  return casosGlobais.filter(c => {
    if (setor !== 'TODOS' && c.setor !== setor) return false;

    if (farmaceut !== 'TODOS') {
      const canonico = getFarmaceuticoPorSetor(c.setor); // vem do js_core
      const doCaso = (c.farmaceutico || "").trim();
      const bate = (canonico === farmaceut) || (doCaso === farmaceut);
      if (!bate) return false;
    }

    if (dataDe || dataAte) {
      const dEv = parseDataFlexivel(c.data_evento);
      if (dEv) {
        const limiteDe  = parseDataFiltroLimite(dataDe, false);
        const limiteAte = parseDataFiltroLimite(dataAte, true);
        if (limiteDe  && dEv < limiteDe)  return false;
        if (limiteAte && dEv > limiteAte) return false;
      }
    }

    return true;
  });
}

/** Parseia o ISO retornado por _mapearCasoResumo_ para dataTriagem → Date | null */
function _parseDataTriagemISO(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

/** RAM efetivamente confirmada — mesma regra usada em todo o dashboard */
function _ehRamConfirmada(c) {
  return c.status === STATUS.CONCLUIDO &&
    (c.conclusao === 'CONFIRMADO' || c.conclusao === 'PROVÁVEL');
}

/** Importação no VigiMed só conta como concluída com nº E data preenchidos */
function _importadoVigimed(c) {
  return !!(c.numVigimed && c.dataVigimed);
}

// ---------------------------------------------------------
// DESENHAR / ATUALIZAR GRÁFICOS
// ---------------------------------------------------------
function desenharGraficos() {
  const dados = obterDadosFiltradosDash();

  const calc = {
    // Bloco 1 — fluxo de gatilhos (BA) e notificações espontâneas (DE)
    gatilhosBA: { total: 0, investigados: 0, descartados: 0, aguardando: 0 },
    notifDE: { investigadas: 0, pendentes: 0 },
    pendenteImportacao: 0,
    origem: { BA: 0, DE: 0 },

    // Bloco 2 — desfecho global, gravidade e evolução temporal
    ram: 0, descarte: 0, analise: 0,
    gravidade: { LEVE: 0, MODERADA: 0, GRAVE: 0, FATAL: 0 },
    diasMapa: new Map(), // "dd/MM" -> { data, totalBA, ram }

    // Bloco 3 — risco por setor, medicamentos suspeitos, funil regulatório
    gravidadeSetor: {},   // setor -> {LEVE,MODERADA,GRAVE,FATAL}, só RAM confirmada
    meds: {},
    funil: { notificacoes: 0, ramConfirmada: 0, importadoVigimed: 0 },

    // Bloco 4 — SLA de triagem e rankings
    slaAnalise: { somaHoras: 0, qtd: 0, atrasados: 0 },
    setorBA: {},          // setor -> {total, concluidos}
    setorDE: {},          // setor -> concluidos
    farmaceuticos: {}
  };

  dados.forEach(c => {
    const isBA = c.tipo === 'BA';
    const isDE = c.tipo === 'DE';
    const ramConfirmada = _ehRamConfirmada(c);

    // --- Bloco 1 ---
    if (isBA) {
      calc.origem.BA++;
      calc.gatilhosBA.total++;
      if (c.status === STATUS.TRIAGEM) calc.gatilhosBA.aguardando++;
      else if (c.status === STATUS.DESCARTADO) calc.gatilhosBA.descartados++;
      else calc.gatilhosBA.investigados++;
    } else if (isDE) {
      calc.origem.DE++;
      if (c.status === STATUS.CONCLUIDO) calc.notifDE.investigadas++;
      else if (c.status === STATUS.INVESTIGACAO) calc.notifDE.pendentes++;
    }
    if (ramConfirmada && !_importadoVigimed(c)) calc.pendenteImportacao++;

    // --- Bloco 2: desfecho global ---
    if (c.status === STATUS.DESCARTADO || c.conclusao === 'NÃO RELACIONADO AO MEDICAMENTO') {
      calc.descarte++;
    } else if (ramConfirmada) {
      calc.ram++;
    } else {
      calc.analise++;
    }

    // --- Bloco 2: gravidade global (concluídos) ---
    if (c.status === STATUS.CONCLUIDO) {
      const g = (c.gravidade || "").toUpperCase().trim();
      if (calc.gravidade[g] !== undefined) calc.gravidade[g]++;
    }

    // --- Bloco 2: evolução temporal (por dia de data_evento) ---
    const dEvento = parseDataFlexivel(c.data_evento);
    if (dEvento) {
      const diaKey = `${String(dEvento.getDate()).padStart(2, '0')}/${String(dEvento.getMonth() + 1).padStart(2, '0')}`;
      if (!calc.diasMapa.has(diaKey)) {
        calc.diasMapa.set(diaKey, { data: new Date(dEvento.getFullYear(), dEvento.getMonth(), dEvento.getDate()), totalBA: 0, ram: 0 });
      }
      const bucket = calc.diasMapa.get(diaKey);
      if (isBA) bucket.totalBA++;
      if (ramConfirmada) bucket.ram++;
    }

    // --- Bloco 3: gravidade por setor, só RAM confirmada ---
    if (ramConfirmada && c.setor) {
      const g = (c.gravidade || "").toUpperCase().trim();
      if (!calc.gravidadeSetor[c.setor]) {
        calc.gravidadeSetor[c.setor] = { LEVE: 0, MODERADA: 0, GRAVE: 0, FATAL: 0 };
      }
      if (calc.gravidadeSetor[c.setor][g] !== undefined) calc.gravidadeSetor[c.setor][g]++;
    }

    // --- Bloco 3: medicamento suspeito, só após triagem farmacêutica ---
    // Em STATUS.TRIAGEM, c.medicamento ainda é o gatilho bruto do ETL, não
    // o suspeito clinicamente avaliado (só sobrescrito em registrarTriagem).
    if (c.medicamento && c.medicamento !== "N/I" &&
        c.status !== STATUS.TRIAGEM && c.status !== STATUS.DESCARTADO) {
      calc.meds[c.medicamento] = (calc.meds[c.medicamento] || 0) + 1;
    }

    // --- Bloco 3: funil de conformidade (3 estágios) ---
    calc.funil.notificacoes++;
    if (ramConfirmada) {
      calc.funil.ramConfirmada++;
      if (_importadoVigimed(c)) calc.funil.importadoVigimed++;
    }

    // --- Bloco 4: SLA de triagem, só gatilhos (BA) já triados ---
    if (isBA && c.dataTriagem && c.status !== STATUS.TRIAGEM) {
      const dTriagem = _parseDataTriagemISO(c.dataTriagem);
      if (dEvento && dTriagem) {
        const horas = (dTriagem.getTime() - dEvento.getTime()) / 3600000;
        if (horas >= 0) {
          calc.slaAnalise.somaHoras += horas;
          calc.slaAnalise.qtd++;
          if (horas > SLA_PADRAO_HORAS) calc.slaAnalise.atrasados++;
        }
      }
    }

    // --- Bloco 4: ranking por setor (BA total/concluídos + DE finalizadas) ---
    if (c.setor) {
      if (isBA) {
        if (!calc.setorBA[c.setor]) calc.setorBA[c.setor] = { total: 0, concluidos: 0 };
        calc.setorBA[c.setor].total++;
        if (c.status === STATUS.CONCLUIDO) calc.setorBA[c.setor].concluidos++;
      } else if (isDE && c.status === STATUS.CONCLUIDO) {
        calc.setorDE[c.setor] = (calc.setorDE[c.setor] || 0) + 1;
      }
    }

    // --- Bloco 4: ranking por farmacêutico (produção concluída, BA+DE) ---
    if (c.status === STATUS.CONCLUIDO) {
      const f = (c.farmaceutico || '').trim();
      if (f) calc.farmaceuticos[f] = (calc.farmaceuticos[f] || 0) + 1;
    }
  });

  // ---------------------------------------------------------
  // KPIs — Bloco 1
  // ---------------------------------------------------------
  document.getElementById('dashCardGatilhosTotal').innerText        = calc.gatilhosBA.total;
  document.getElementById('dashCardGatilhosInvestigados').innerText = calc.gatilhosBA.investigados;
  document.getElementById('dashCardGatilhosDescartados').innerText  = calc.gatilhosBA.descartados;
  document.getElementById('dashCardAguardandoTriagem').innerText    = calc.gatilhosBA.aguardando;
  document.getElementById('dashCardNotifInvestigadas').innerText    = calc.notifDE.investigadas;
  document.getElementById('dashCardNotifPendentes').innerText       = calc.notifDE.pendentes;
  document.getElementById('dashCardPendenteImportacao').innerText   = calc.pendenteImportacao;

  const totalOrigem   = calc.origem.BA + calc.origem.DE;
  const pctEspontanea = totalOrigem ? Math.round((calc.origem.DE / totalOrigem) * 100) : 0;
  document.getElementById('dashCardTaxaEspontanea').innerText = pctEspontanea + '%';
  const barraEspontanea = document.getElementById('dashBarraEspontanea');
  if (barraEspontanea) barraEspontanea.style.width = pctEspontanea + '%';
  const subEspontanea = document.getElementById('dashCardTaxaEspontaneaSub');
  if (subEspontanea) {
    subEspontanea.innerText = totalOrigem
      ? `${calc.origem.DE} espontânea(s) · ${calc.origem.BA} busca ativa`
      : 'Sem notificações no período';
  }

  // ---------------------------------------------------------
  // KPIs — Bloco 4 (SLA de triagem)
  // ---------------------------------------------------------
  const tempoMedioH = calc.slaAnalise.qtd ? (calc.slaAnalise.somaHoras / calc.slaAnalise.qtd) : null;
  document.getElementById('dashCardTempoMedio').innerText = tempoMedioH === null ? '—' : formatarTempoSLA(tempoMedioH);
  document.getElementById('dashCardAtrasados').innerText = calc.slaAnalise.atrasados;
  document.getElementById('dashCardAtrasadosSub').innerText = calc.slaAnalise.qtd
    ? `${calc.slaAnalise.atrasados} de ${calc.slaAnalise.qtd} gatilho(s) triado(s) no período`
    : 'Sem gatilhos triados no período';

  // ---------------------------------------------------------
  // GRÁFICOS
  // ---------------------------------------------------------
  [_grafTemporal, _grafDesfechos, _grafGravidade, _grafGravidadeSetor, _grafMedicamentos, _grafFunil]
    .forEach(g => { if (g) g.destroy(); });
  _grafTemporal = _grafDesfechos = _grafGravidade = _grafGravidadeSetor = _grafMedicamentos = _grafFunil = null;

  Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

  // Paleta sensível ao tema. desenharGraficos() é re-chamada ao alternar o
  // tema (js_core _aplicarTema) — no tema claro os valores igualam os
  // defaults do Chart.js, nada muda.
  const _escuro   = document.documentElement.getAttribute('data-theme') === 'dark';
  const corTexto  = _escuro ? '#cbd5e1' : '#666';
  const corGrade  = _escuro ? 'rgba(148,163,184,0.16)' : 'rgba(0,0,0,0.1)';
  const corNeutra = _escuro ? '#475569' : '#94a3b8';
  const corRam    = _escuro ? '#f87171' : '#dc2626';
  const corFatal  = _escuro ? '#64748b' : '#112937';
  Chart.defaults.color       = corTexto;
  Chart.defaults.borderColor = corGrade;

  // Gráfico 1 (Bloco 2) — Evolução Temporal de RAMs
  const diasOrdenados = [...calc.diasMapa.values()].sort((a, b) => a.data - b.data);
  _grafTemporal = new Chart(document.getElementById('graficoTemporal').getContext('2d'), {
    type: 'line',
    data: {
      labels: diasOrdenados.map(d => `${String(d.data.getDate()).padStart(2, '0')}/${String(d.data.getMonth() + 1).padStart(2, '0')}`),
      datasets: [
        { label: 'Total Rastreado (BA)', data: diasOrdenados.map(d => d.totalBA), borderColor: corNeutra, backgroundColor: corNeutra, tension: 0.3, fill: false },
        { label: 'RAM Confirmada',       data: diasOrdenados.map(d => d.ram),     borderColor: corRam,    backgroundColor: corRam,    tension: 0.3, fill: false }
      ]
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
    }
  });

  // Gráfico 2 (Bloco 2) — Desfecho dos gatilhos (rosca)
  _grafDesfechos = new Chart(document.getElementById('graficoDesfechos').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['RAM Confirmada', 'Descartados', 'Em Análise'],
      datasets: [{
        data: [calc.ram, calc.descarte, calc.analise],
        backgroundColor: ['#ef4444', '#9ca3af', '#f97316'],
        borderWidth: 0
      }]
    },
    options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
  });

  // Gráfico 3 (Bloco 2) — Distribuição de gravidade (pizza)
  _grafGravidade = new Chart(document.getElementById('graficoGravidade').getContext('2d'), {
    type: 'pie',
    data: {
      labels: ['Leve', 'Moderada', 'Grave', 'Fatal'],
      datasets: [{
        data: [calc.gravidade.LEVE, calc.gravidade.MODERADA, calc.gravidade.GRAVE, calc.gravidade.FATAL],
        backgroundColor: ['#fcd34d', '#f97316', '#dc2626', corFatal],
        borderWidth: 0
      }]
    },
    options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
  });

  // Gráfico 4 (Bloco 3) — RAM por Setor × Gravidade (barras empilhadas, top 8)
  const setoresRam = Object.keys(calc.gravidadeSetor)
    .sort((a, b) => {
      const totA = Object.values(calc.gravidadeSetor[a]).reduce((s, v) => s + v, 0);
      const totB = Object.values(calc.gravidadeSetor[b]).reduce((s, v) => s + v, 0);
      return totB - totA;
    })
    .slice(0, 8);

  _grafGravidadeSetor = new Chart(document.getElementById('graficoGravidadeSetor').getContext('2d'), {
    type: 'bar',
    data: {
      labels: setoresRam,
      datasets: [
        { label: 'Leve',     data: setoresRam.map(s => calc.gravidadeSetor[s].LEVE),     backgroundColor: '#fcd34d' },
        { label: 'Moderada', data: setoresRam.map(s => calc.gravidadeSetor[s].MODERADA), backgroundColor: '#f97316' },
        { label: 'Grave',    data: setoresRam.map(s => calc.gravidadeSetor[s].GRAVE),    backgroundColor: '#dc2626' },
        { label: 'Fatal',    data: setoresRam.map(s => calc.gravidadeSetor[s].FATAL),    backgroundColor: corFatal }
      ]
    },
    options: {
      maintainAspectRatio: false,
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true, ticks: { precision: 0 } }
      },
      plugins: { legend: { position: 'bottom' } }
    }
  });

  // Gráfico 5 (Bloco 3) — Top 5 Medicamentos Suspeitos (barras horizontais)
  const topMeds = Object.keys(calc.meds)
    .sort((a, b) => calc.meds[b] - calc.meds[a])
    .slice(0, 5);

  _grafMedicamentos = new Chart(document.getElementById('graficoMedicamentos').getContext('2d'), {
    type: 'bar',
    data: {
      labels: topMeds,
      datasets: [{
        label: 'Suspeitas (confirmadas na triagem)',
        data: topMeds.map(m => calc.meds[m]),
        backgroundColor: '#8b5cf6'
      }]
    },
    options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });

  // Gráfico 6 (Bloco 3) — Funil de Conformidade Regulatória (3 estágios)
  _grafFunil = new Chart(document.getElementById('graficoFunil').getContext('2d'), {
    type: 'bar',
    data: {
      labels: ['Notificações (BA + DE)', 'RAM Confirmada', 'Importado VigiMed'],
      datasets: [{
        data: [calc.funil.notificacoes, calc.funil.ramConfirmada, calc.funil.importadoVigimed],
        backgroundColor: ['#94a3b8', '#f97316', '#059669']
      }]
    },
    options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });

  // Rankings em tabela (Bloco 4)
  _renderizarRankingSetores(calc.setorBA, calc.setorDE);
  _renderizarRankingFarmaceuticos(calc.farmaceuticos);
}

// ---------------------------------------------------------
// Ranking de produção por setor (tabela, top 10)
// Colunas: Total de Gatilhos (BA) | Notif. Espontânea Finalizadas (DE) | % Conclusão (dos BA)
// ---------------------------------------------------------
function _renderizarRankingSetores(setorBA, setorDE) {
  const corpo = document.getElementById('rankingSetoresBody');
  if (!corpo) return;

  const setores = new Set([...Object.keys(setorBA), ...Object.keys(setorDE)]);
  const linhas = [...setores]
    .map(s => {
      const ba = setorBA[s] || { total: 0, concluidos: 0 };
      return { setor: s, totalBA: ba.total, concluidosBA: ba.concluidos, deFinalizadas: setorDE[s] || 0 };
    })
    .sort((a, b) => (b.concluidosBA + b.deFinalizadas) - (a.concluidosBA + a.deFinalizadas))
    .slice(0, 10);

  corpo.innerHTML = linhas.length === 0
    ? '<tr><td colspan="5" class="text-center text-gray-400 py-3">Sem dados no período.</td></tr>'
    : linhas.map((l, i) => {
        const pct = l.totalBA ? Math.round((l.concluidosBA / l.totalBA) * 100) : null;
        const pctTexto = pct === null ? '—' : pct + '%';
        const corPct = pct === null ? 'text-gray-400' : (pct >= 70 ? 'text-teal-600' : (pct >= 40 ? 'text-orange-500' : 'text-red-500'));
        return `<tr class="border-b border-gray-100">
          <td class="py-1.5 px-2 text-gray-400 font-bold">${i + 1}º</td>
          <td class="py-1.5 px-2 font-semibold text-gray-700">${escapeHtml(l.setor)}</td>
          <td class="py-1.5 px-2 text-center">${l.totalBA}</td>
          <td class="py-1.5 px-2 text-center">${l.deFinalizadas}</td>
          <td class="py-1.5 px-2 text-right font-bold ${corPct}">${pctTexto}</td>
        </tr>`;
      }).join('');
}

// ---------------------------------------------------------
// Ranking de produção por farmacêutico (tabela, top 10)
// ---------------------------------------------------------
function _renderizarRankingFarmaceuticos(farmaceuticos) {
  const corpo = document.getElementById('rankingFarmaceuticosBody');
  if (!corpo) return;

  const total = Object.values(farmaceuticos).reduce((s, v) => s + v, 0);
  const linhas = Object.keys(farmaceuticos)
    .map(f => ({ nome: f, concluidos: farmaceuticos[f] }))
    .sort((a, b) => b.concluidos - a.concluidos)
    .slice(0, 10);

  corpo.innerHTML = linhas.length === 0
    ? '<tr><td colspan="4" class="text-center text-gray-400 py-3">Sem casos concluídos no período.</td></tr>'
    : linhas.map((l, i) => {
        const pct = total ? Math.round((l.concluidos / total) * 100) : 0;
        return `<tr class="border-b border-gray-100">
          <td class="py-1.5 px-2 text-gray-400 font-bold">${i + 1}º</td>
          <td class="py-1.5 px-2 font-semibold text-gray-700">${escapeHtml(l.nome)}</td>
          <td class="py-1.5 px-2 text-center">${l.concluidos}</td>
          <td class="py-1.5 px-2 text-right text-gray-400">${pct}%</td>
        </tr>`;
      }).join('');
}
</script>
