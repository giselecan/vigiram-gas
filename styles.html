<style>
  /* =====================================================
     TOKENS DE COR — STATUS / BADGES (fonte única da verdade)
     Centraliza as cores semânticas do domínio (tipo de origem,
     status do caso, SLA, VigiMed) que antes viviam espalhadas em
     classes utilitárias do Tailwind pelo HTML/JS. Mudar a paleta
     agora é editar aqui. Também é a base pronta para um tema
     escuro futuro: bastaria sobrescrever estas variáveis num
     seletor :root[data-theme="dark"]. Os valores espelham as
     cores atuais do Tailwind — nenhuma mudança visual.
  ===================================================== */
  :root {
    /* Origem da notificação */
    --cor-de-bg: #f3e8ff; --cor-de-fg: #6b21a8;   /* DE — assistência (roxo) */
    --cor-ba-bg: #fee2e2; --cor-ba-fg: #991b1b;   /* BA — robô/ETL (vermelho) */

    /* Status do caso */
    --cor-triagem:      #f97316;  /* laranja */
    --cor-investigacao: #2563eb;  /* azul   */
    --cor-concluido:    #15803d;  /* verde  */
    --cor-descartado:   #6b7280;  /* cinza  */

    /* SLA */
    --cor-sla-ok-bg:   #d1fae5; --cor-sla-ok-fg:   #065f46; --cor-sla-ok-bd:   #6ee7b7;
    --cor-sla-warn-bg: #fef9c3; --cor-sla-warn-fg: #92400e; --cor-sla-warn-bd: #fde68a;
    --cor-sla-late-bg: #fee2e2; --cor-sla-late-fg: #991b1b; --cor-sla-late-bd: #fca5a5;
    --cor-sla-sem-bg:  #f3f4f6; --cor-sla-sem-fg:  #6b7280; --cor-sla-sem-bd:  #e5e7eb;

    /* Importação VigiMed */
    --cor-vigimed-ok-bg:   #ecfdf5; --cor-vigimed-ok-fg:   #047857; --cor-vigimed-ok-bd:   #a7f3d0;
    --cor-vigimed-pend-bg: #fffbeb; --cor-vigimed-pend-fg: #b45309; --cor-vigimed-pend-bd: #fde68a;
  }

  /* =====================================================
     ANIMAÇÕES E TRANSITIONS GLOBAIS
  ===================================================== */
  .fade-in { animation: fadeIn 0.25s ease-in; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }

  /* Transição de TELA (login <-> app, troca de abas). display:none corta
     transições de CSS, então re-disparamos esta animação por JS (reflow)
     ao exibir a tela — cross-fade suave em vez do "salto" seco. */
  .tela-anim { animation: telaFade 0.35s cubic-bezier(.4,0,.2,1) both; }
  @keyframes telaFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  /* Entrada do cartão de login — pop suave (spring leve). */
  .login-card-anim { animation: loginPop 0.42s cubic-bezier(.34,1.4,.64,1) both; }
  @keyframes loginPop {
    from { opacity: 0; transform: translateY(14px) scale(.965); }
    to   { opacity: 1; transform: none; }
  }

  /* Botões em carregamento — feedback consistente (login, sincronizar…). */
  .btn-carregando { pointer-events: none; opacity: .9; cursor: progress; }

  /* Respeita usuários que pediram menos movimento. */
  @media (prefers-reduced-motion: reduce) {
    .tela-anim, .login-card-anim, .fade-in { animation: none; }
  }

  /* =====================================================
     SAAS POLISH — navbar, badges, cards
  ===================================================== */
  .aba-ativa   { background-color: #0d9488; color: white; box-shadow: inset 0 -3px 0 #f97316; border-radius: 10px 10px 0 0; }
  .aba-inativa { background-color: transparent; color: #99f6e4; border-radius: 10px 10px 0 0; }
  .aba-inativa:hover { background-color: rgba(255,255,255,0.08); color: white; }

  .navbar-divider {
    width: 1px;
    align-self: stretch;
    background: rgba(255,255,255,0.12);
    margin: 0 4px;
  }

  .pill-action {
    transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease;
  }
  .pill-action:hover { transform: translateY(-1px); }
  .pill-action:active { transform: translateY(0); }

  .card-elevated {
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
  }

  .badge-soft {
    font-variant-numeric: tabular-nums;
    letter-spacing: .02em;
  }

  /* =====================================================
     SKELETON LOADERS
  ===================================================== */
  .skeleton {
    background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton-card { height: 110px; margin-bottom: 12px; }

  /* =====================================================
     BADGES DE SLA — cores vindas dos tokens :root
  ===================================================== */
  .badge-sla-ok   { background: var(--cor-sla-ok-bg);   color: var(--cor-sla-ok-fg);   border: 1px solid var(--cor-sla-ok-bd); }
  .badge-sla-warn { background: var(--cor-sla-warn-bg); color: var(--cor-sla-warn-fg); border: 1px solid var(--cor-sla-warn-bd); }
  .badge-sla-late { background: var(--cor-sla-late-bg); color: var(--cor-sla-late-fg); border: 1px solid var(--cor-sla-late-bd); }
  .badge-sla-sem  { background: var(--cor-sla-sem-bg);  color: var(--cor-sla-sem-fg);  border: 1px solid var(--cor-sla-sem-bd); }

  /* =====================================================
     BADGES DE STATUS / ORIGEM / VIGIMED — tokens :root
     (substituem as classes de cor utilitárias do Tailwind que
     antes ficavam inline no construirCard e afins)
  ===================================================== */
  .badge-tipo-de { background: var(--cor-de-bg); color: var(--cor-de-fg); }
  .badge-tipo-ba { background: var(--cor-ba-bg); color: var(--cor-ba-fg); }

  .txt-concluido  { color: var(--cor-concluido); }
  .txt-descartado { color: var(--cor-descartado); }

  .badge-vigimed-ok   { background: var(--cor-vigimed-ok-bg);   color: var(--cor-vigimed-ok-fg);   border: 1px solid var(--cor-vigimed-ok-bd); }
  .badge-vigimed-pend { background: var(--cor-vigimed-pend-bg); color: var(--cor-vigimed-pend-fg); border: 1px solid var(--cor-vigimed-pend-bd); }

  /* =====================================================
     TEMA ESCURO — "skin" sobre o Tailwind (sem rebuild).
     Ativado por data-theme="dark" no <html> (definido cedo, antes
     do paint, por um script no <head> que lê localStorage). Reaproveita
     os tokens de status (sobrescritos abaixo) e remapeia os utilitários
     de superfície/texto/borda mais usados. A especificidade do seletor
     (atributo + descendente) vence a classe utilitária simples do
     Tailwind sem precisar de !important. A navbar/login teal e os botões
     de ação coloridos permanecem — só as superfícies neutras invertem.
  ===================================================== */
  :root[data-theme="dark"] {
    /* Badges de status/origem/SLA/VigiMed reajustados p/ fundo escuro */
    --cor-de-bg: rgba(168,85,247,.20); --cor-de-fg: #e9d5ff;
    --cor-ba-bg: rgba(239,68,68,.20);  --cor-ba-fg: #fecaca;
    --cor-concluido: #4ade80; --cor-descartado: #94a3b8;
    --cor-sla-ok-bg:  rgba(16,185,129,.16); --cor-sla-ok-fg:  #6ee7b7; --cor-sla-ok-bd:  rgba(16,185,129,.40);
    --cor-sla-warn-bg:rgba(234,179,8,.16);  --cor-sla-warn-fg:#fde047; --cor-sla-warn-bd:rgba(234,179,8,.40);
    --cor-sla-late-bg:rgba(239,68,68,.16);  --cor-sla-late-fg:#fca5a5; --cor-sla-late-bd:rgba(239,68,68,.40);
    --cor-sla-sem-bg: rgba(148,163,184,.16);--cor-sla-sem-fg: #cbd5e1; --cor-sla-sem-bd: rgba(148,163,184,.35);
    --cor-vigimed-ok-bg:  rgba(16,185,129,.16); --cor-vigimed-ok-fg:  #6ee7b7; --cor-vigimed-ok-bd:  rgba(16,185,129,.40);
    --cor-vigimed-pend-bg:rgba(245,158,11,.16); --cor-vigimed-pend-fg:#fcd34d; --cor-vigimed-pend-bd:rgba(245,158,11,.40);

    --dk-bg: #0f172a;        /* fundo do app */
    --dk-surface: #1e293b;   /* cartões / painéis / modais */
    --dk-surface-2: #172033; /* inputs / superfícies sutis */
    --dk-border: #334155;
    --dk-txt: #e5e7eb;
    --dk-txt-2: #94a3b8;
  }

  /* Fundo geral + superfícies */
  :root[data-theme="dark"] body               { background-color: var(--dk-bg); color: var(--dk-txt); }
  :root[data-theme="dark"] .bg-gray-100,
  :root[data-theme="dark"] .bg-slate-100      { background-color: var(--dk-bg); }
  :root[data-theme="dark"] .bg-white          { background-color: var(--dk-surface); }
  :root[data-theme="dark"] .bg-gray-50        { background-color: var(--dk-surface-2); }
  :root[data-theme="dark"] .bg-gray-200       { background-color: #334155; }
  :root[data-theme="dark"] .bg-gray-300       { background-color: #475569; }
  :root[data-theme="dark"] .bg-gray-900       { background-color: #020617; }

  /* Texto */
  :root[data-theme="dark"] .text-gray-800,
  :root[data-theme="dark"] .text-gray-700     { color: var(--dk-txt); }
  :root[data-theme="dark"] .text-gray-600,
  :root[data-theme="dark"] .text-gray-500,
  :root[data-theme="dark"] .text-gray-400     { color: var(--dk-txt-2); }
  :root[data-theme="dark"] .text-teal-700     { color: #5eead4; }   /* legível sobre cartão escuro */

  /* Bordas */
  :root[data-theme="dark"] .border-gray-100,
  :root[data-theme="dark"] .border-gray-200,
  :root[data-theme="dark"] .border-gray-300   { border-color: var(--dk-border); }
  :root[data-theme="dark"] .divide-gray-100 > :not([hidden]) ~ :not([hidden]) { border-color: var(--dk-border); }
  :root[data-theme="dark"] .kanban-card       { border-color: var(--dk-border); }

  /* Hovers de superfície */
  :root[data-theme="dark"] .hover\:bg-gray-50:hover  { background-color: #233043; }
  :root[data-theme="dark"] .hover\:bg-gray-100:hover { background-color: #233043; }
  :root[data-theme="dark"] .hover\:bg-gray-200:hover { background-color: #2b3a52; }
  :root[data-theme="dark"] .hover\:bg-white:hover    { background-color: var(--dk-surface); }
  :root[data-theme="dark"] .naranjo-row:hover        { background: #233043; }

  /* Skeleton no escuro */
  :root[data-theme="dark"] .skeleton {
    background: linear-gradient(90deg, #1e293b 25%, #273549 50%, #1e293b 75%);
    background-size: 200% 100%;
  }

  /* --- Painéis tingidos (info boxes, seções coloridas de modais/admin) ---
     No claro são fundos -50/-100 com texto -700/-800 casado. No escuro isso
